<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание №3 - Слайдер изображений на Swiper</title>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/styleTask3.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <h1 class="header__title">📚 Учебная практика №1</h1>
                <p class="header__subtitle">Логинов Сергей Андреевич</p>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="background-card">
                    <h2 class="card-title" id="sliderTitle">Слайдер фото</h2>

                    <div class="slider-wrapper">
                        <div class="swiper mySwiper">
                            <div class="swiper-wrapper" id="swiperWrapper"></div>

                            <div class="swiper-button-next"></div>
                            <div class="swiper-button-prev"></div>

                            <div class="swiper-pagination"></div>
                        </div>
                    </div>

                    <div class="slider-counter" id="sliderCounter">
                        Изображение <span id="currentSlide">1</span> из <span id="totalSlides">8</span>
                    </div>

                    <div class="back-btn">
                        <button onclick="window.location.href='../index.html'" class="btn btn--secondary">
                            ← Вернуться на главную
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Учебная практика №1 | Все права защищены</p>
            </div>
        </footer>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../js/scriptTask3.js"></script>
</body>
</html>
