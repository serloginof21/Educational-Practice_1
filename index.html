<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Учебная практика №1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="container">
                <h1 class="header__title">📚 Учебная практика №1</h1>
                <p class="header__subtitle">Логинов Сергей Андреевич</p>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="cards-grid">
                    <div class="card">
                        <div class="card__icon">🔄</div>
                        <h2 class="card__title">Задание 1</h2>
                        <p class="card__description">Стилистическое преобразование чисел</p>
                        <button class="btn btn--primary" data-task="1">
                            Перейти к заданию →
                        </button>
                    </div>

                    <div class="card">
                        <div class="card__icon">🎨</div>
                        <h2 class="card__title">Задание 2</h2>
                        <p class="card__description">Простой слайдер изображений</p>
                        <button class="btn btn--primary" data-task="2">
                            Перейти к заданию →
                        </button>
                    </div>

                    <div class="card">
                        <div class="card__icon">📱</div>
                        <h2 class="card__title">Задание 3</h2>
                        <p class="card__description">Слайдер изображений с использованием библиотек/фреймворков</p>
                        <button class="btn btn--primary" data-task="3">
                            Перейти к заданию →
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Учебная практика №1 | Все права защищены</p>
            </div>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
